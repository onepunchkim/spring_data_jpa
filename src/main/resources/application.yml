spring:
  datasource:
    url: jdbc:h2:tcp://localhost/~/datajpa
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        #show_sql: true

  output:
    ansi:
      enabled: always

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 2000
        one-indexed-parameters: true #page번호 1부터 시작 but 단점 존재
logging:
  level:
    org.hibernate.SQL: debug
    #org.hibernate.type: trace
    #org.hibernate.orm.jdbc.bind: trace #version 3.x, hibernate6
